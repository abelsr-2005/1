flush ruleset

table inet filter {

    set ssh_limit {
        type ipv4_addr
        size 1
    }

    chain input {
        type filter hook input priority 0;
        policy drop;

        ct state established,related accept
        iif lo accept
    }

    chain forward {
        type filter hook forward priority 0;
        policy drop;

        ct state established,related accept

        # LAN -> DMZ web y ssh
        ip saddr 192.168.87.0/24 ip daddr 172.16.87.0/24 tcp dport {22,587} accept

        # DNS desde DMZ
        ip saddr 172.16.87.0/24 udp dport 53 accept

        # Ping LAN -> DMZ
        ip saddr 192.168.87.0/24 ip daddr 172.16.87.0/24 icmp type echo-request accept

        # Traceroute LAN -> DMZ
        ip saddr 192.168.87.0/24 ip daddr 172.16.87.0/24 udp accept

        # SSH solo una conexión
        ip saddr 192.168.87.0/24 tcp dport 22 add @ssh_limit { ip saddr } accept

        # Protección DoS: 7 conexiones por minuto
        ip saddr 10.6.0.0/16 tcp dport 587 ct state new limit rate 7/minute accept
    }
}

table ip nat {

    chain prerouting {
        type nat hook prerouting priority 0;

        # DNAT
        ip saddr 10.6.0.0/16 tcp dport 587 dnat to 172.16.87.10:587
    }

}
