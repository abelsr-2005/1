#!/usr/sbin/nft -f
flush ruleset

# Variables
define WAN     = ens18
define LAN_IF  = ens19
define DMZ_IF  = ens20
define LAN_NET = 192.168.87.0/24
define DMZ_NET = 172.16.87.0/24
define DMZ_IP  = 172.16.87.2
define EXT_NET = 10.6.0.0/16
define WEB_PORT = 7587

table inet filter {

    chain input {
        type filter hook input priority 0; policy drop;

        # Conexiones establecidas
        ct state established,related accept

        # Loopback
        iif lo accept

        # SSH desde LAN al firewall (gestión)
        iifname $LAN_IF tcp dport 22 accept

        # Ping desde LAN al firewall
        iifname $LAN_IF icmp type echo-request accept
    }

    chain forward {
        type filter hook forward priority 0; policy drop;

        # Conexiones establecidas
        ct state established,related accept

        # ── PING y TRACEROUTE: solo LAN → DMZ ──
        iifname $LAN_IF oifname $DMZ_IF icmp type echo-request accept
        # Bloqueo silencioso: DMZ → LAN
        iifname $DMZ_IF oifname $LAN_IF icmp type echo-request drop
        # Bloqueo silencioso: exterior → LAN
        iifname $WAN oifname $LAN_IF icmp type echo-request drop

        # ── ACCESO WEB externo → DMZ (después de DNAT) ──
        # Límite: 7 conexiones nuevas por minuto por IP de origen
        iifname $WAN oifname $DMZ_IF tcp dport $WEB_PORT \
            ct state new limit rate 7/minute accept
        iifname $WAN oifname $DMZ_IF tcp dport $WEB_PORT \
            ct state new drop

        # ── SSH LAN → DMZ: solo 1 sesión activa ──
        iifname $LAN_IF oifname $DMZ_IF tcp dport 22 \
            ct state new ct count over 1 reject
        iifname $LAN_IF oifname $DMZ_IF tcp dport 22 accept

        # ── DMZ: estado silencioso (no puede iniciar conexiones) ──
        # Excepción DNS para actualizaciones
        iifname $DMZ_IF oifname $WAN udp dport 53 accept
        iifname $DMZ_IF oifname $WAN tcp dport 53 accept

        # Bloquear cualquier otro tráfico iniciado desde DMZ
        iifname $DMZ_IF drop
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

table ip nat {

    chain prerouting {
        type nat hook prerouting priority -100;

        # DNAT: redirige peticiones web externas al servidor DMZ
        iifname $WAN tcp dport $WEB_PORT \
            dnat to $DMZ_IP:$WEB_PORT
    }

    chain postrouting {
        type nat hook postrouting priority 100;

        # Masquerade para tráfico saliente
        oifname $WAN masquerade
    }
}
